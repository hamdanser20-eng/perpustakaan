<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Perpustakaan Digital Modern</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind config (opsional) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
                    animation: { 'float-slow': 'float 8s ease-in-out infinite' },
                    keyframes: { float: { '0%,100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-15px)' } } }
                }
            }
        }
    </script>
    <!-- Import Map untuk Firebase -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js"
            }
        }
    </script>
</head>
<body class="font-sans text-slate-700 min-h-screen flex flex-col">

    <!-- Decorative blobs -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute -top-32 -left-32 w-96 h-96 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-float-slow"></div>
        <div class="absolute bottom-0 right-0 w-80 h-80 bg-cyan-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float-slow" style="animation-delay: -3s;"></div>
        <div class="absolute top-1/3 left-1/2 w-72 h-72 bg-emerald-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float-slow" style="animation-delay: -6s;"></div>
    </div>

    <div id="app" class="relative z-10 container mx-auto px-4 py-6 max-w-7xl flex-grow">
        <!-- Auth Card -->
        <div id="authSection" class="flex justify-center items-center min-h-[85vh]">
            <div class="card-glass w-full max-w-md p-8">
                <div class="text-center mb-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-teal-400 to-emerald-500 rounded-3xl flex items-center justify-center mx-auto shadow-lg">
                        <i class="fas fa-book-open text-4xl text-white"></i>
                    </div>
                    <h2 class="text-3xl font-extrabold mt-4 bg-gradient-to-r from-teal-700 to-emerald-600 bg-clip-text text-transparent">Perpustakaan</h2>
                    <p class="text-teal-600 text-sm">SMK Plus Insan Cemerlang</p>
                </div>
                <div class="flex gap-2 mb-6 bg-white/50 p-1 rounded-2xl">
                    <button id="loginTabBtn" class="w-1/2 py-2.5 font-semibold rounded-xl bg-white shadow-sm text-teal-700">Masuk</button>
                    <button id="registerTabBtn" class="w-1/2 py-2.5 font-semibold rounded-xl text-teal-600">Daftar</button>
                </div>
                <div id="loginForm">
                    <div class="mb-3"><input type="text" id="loginUsername" placeholder="Username" class="w-full p-3 border border-teal-200 rounded-2xl bg-white/70"></div>
                    <div class="mb-5 relative"><input type="password" id="loginPassword" placeholder="Password" class="w-full p-3 border border-teal-200 rounded-2xl pr-12 bg-white/70"><i class="fas fa-eye-slash toggle-pwd absolute right-4 top-1/2 -translate-y-1/2" id="toggleLoginPwd"></i></div>
                    <button id="doLoginBtn" class="w-full btn-primary text-white py-3 rounded-2xl font-bold text-lg shadow">Masuk Sekarang</button>
                </div>
                <div id="registerForm" class="hidden">
                    <input type="text" id="regName" placeholder="Nama Lengkap" class="w-full mb-2 p-3 border border-teal-200 rounded-2xl bg-white/70">
                    <input type="text" id="regClass" placeholder="Kelas" class="w-full mb-2 p-3 border border-teal-200 rounded-2xl bg-white/70">
                    <input type="text" id="regPhone" placeholder="Telepon" class="w-full mb-2 p-3 border border-teal-200 rounded-2xl bg-white/70">
                    <input type="text" id="regUsername" placeholder="Username" class="w-full mb-2 p-3 border border-teal-200 rounded-2xl bg-white/70">
                    <div class="relative mb-4"><input type="password" id="regPassword" placeholder="Password" class="w-full p-3 border border-teal-200 rounded-2xl pr-12 bg-white/70"><i class="fas fa-eye-slash toggle-pwd absolute right-4 top-1/2 -translate-y-1/2" id="toggleRegPwd"></i></div>
                    <button id="doRegisterBtn" class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-2xl font-bold transition">Daftar Anggota</button>
                </div>
            </div>
        </div>

        <!-- Dashboard Utama -->
        <div id="dashboardSection" class="hidden">
            <div class="card-glass p-4 flex flex-wrap justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-teal-500 rounded-xl flex items-center justify-center shadow"><i class="fas fa-book text-white"></i></div>
                    <div><h1 class="text-2xl font-bold text-slate-800">Perpustakaan</h1><p class="text-sm text-teal-600">Halo, <span id="userNameDisplay" class="font-semibold"></span> · <span id="userRoleBadge" class="badge-new"></span></p></div>
                </div>
                <button id="logoutBtn" class="bg-white/70 hover:bg-white text-slate-700 px-5 py-2 rounded-full shadow-sm border border-teal-200"><i class="fas fa-sign-out-alt mr-2"></i>Keluar</button>
            </div>
            <div id="navTabs" class="flex flex-wrap gap-3 mb-6"></div>
            <div id="contentPanel" class="card-glass p-6 min-h-[500px] transition-all"><div class="text-center text-teal-500"><i class="fas fa-spinner fa-pulse mr-2"></i> Memuat data...</div></div>
        </div>
    </div>

    <footer class="relative z-10 text-center py-4 text-teal-600 text-sm border-t border-teal-200 bg-white/40 backdrop-blur-sm mt-6">
        <div class="container mx-auto px-4"><i class="fas fa-book-open mr-1"></i> Perpustakaan SMK Plus Insan Cemery© 2026</div>
    </footer>

    <!-- Modal Global -->
    <div id="globalModal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-bg transition-all" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4"><h3 id="modalTitle" class="text-xl font-bold text-teal-700"></h3><button id="closeModalBtn" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div>
            <div id="modalBody"></div>
            <div class="mt-5 flex justify-end gap-3"><button id="modalCancelBtn" class="px-4 py-2 border border-teal-300 rounded-xl text-teal-600">Batal</button><button id="modalConfirmBtn" class="px-4 py-2 bg-teal-500 text-white rounded-xl hover:bg-teal-600">Simpan</button></div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModalGlobal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-bg transition-all" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-teal-700"><i class="fas fa-money-bill-wave mr-2"></i>Bayar Denda</h3><button id="closePaymentModal" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div>
            <div id="paymentBodyModal"></div>
            <div class="mt-5 flex justify-end gap-3"><button id="cancelPaymentModal" class="px-4 py-2 border border-teal-300 rounded-xl text-teal-600">Batal</button><button id="confirmPaymentModal" class="px-4 py-2 bg-teal-500 text-white rounded-xl hover:bg-teal-600">Kirim Bukti</button></div>
        </div>
    </div>

    <!-- Main Module Script -->
    <script type="module" src="main.js"></script>
</body>
</html>
