<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>e-Library Senja | Manajemen Buku & Anggota</title>
    <!-- Tailwind + Fonts + Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Outfit', 'system-ui', 'sans-serif'] },
                    animation: { 'drift': 'drift 7s ease-in-out infinite', 'glow': 'glow 2s ease-in-out infinite' },
                    keyframes: {
                        drift: { '0%,100%': { transform: 'translateY(0px) translateX(0px)' }, '50%': { transform: 'translateY(-12px) translateX(6px)' } },
                        glow: { '0%,100%': { opacity: 0.6 }, '50%': { opacity: 1 } }
                    }
                }
            }
        }
    </script>
    <style>
        /* Warm sunset / modern soft palette */
        body {
            background: linear-gradient(145deg, #fef9e6 0%, #fff2e0 40%, #ffe6d5 100%);
            background-attachment: fixed;
        }
        .glass-elegant {
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0,0,0,0.02);
            border: 1px solid rgba(253, 186, 116, 0.4);
        }
        .btn-soft {
            background: linear-gradient(105deg, #f97316, #ea580c);
            transition: all 0.2s ease;
            box-shadow: 0 6px 14px rgba(249,115,22,0.25);
        }
        .btn-soft:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 22px -8px #f97316b3;
        }
        .table-modern tbody tr {
            transition: background 0.15s;
        }
        .table-modern tbody tr:hover {
            background: #ffefe3;
        }
        .badge-soft {
            background: #fef3c7;
            color: #b45309;
            border-radius: 9999px;
            padding: 0.25rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #fce7d6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        .toggle-pwd {
            cursor: pointer;
            color: #f97316;
            transition: 0.1s;
        }
        input, select, textarea {
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            ring: 2px solid #f97316;
            border-color: #f97316;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js"
            }

    </script>
</head>
<body class="font-sans text-stone-800 min-h-screen flex flex-col">

    <!-- floating decorative elements -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-16 left-5 w-64 h-64 bg-orange-200/40 rounded-full blur-3xl animate-drift"></div>
        <div class="absolute bottom-10 right-0 w-80 h-80 bg-amber-200/40 rounded-full blur-3xl animate-drift" style="animation-delay: -2s;"></div>
        <div class="absolute top-1/3 right-1/4 w-56 h-56 bg-yellow-100/50 rounded-full blur-2xl animate-drift" style="animation-delay: -4s;"></div>
    </div>

    <div id="appRoot" class="relative z-10 container mx-auto px-4 py-6 max-w-7xl flex-grow">

        <div id="authWrapper" class="flex justify-center items-center min-h-[85vh]">

                <div class="text-center mb-5">

                    <h2 class="text-3xl font-extrabold mt-2 bg-gradient-to-r from-amber-700 to-orange-600 bg-clip-text text-transparent">e-Library Senja</h2>
                    <p class="text-orange-600 text-sm">SMK Insan Cemerlang • Digital Koleksi</p>
                </div>
                <div class="flex gap-2 mb-5 bg-orange-100/70 p-1.5 rounded-2xl">
                    <button id="loginTabBtn" class="w-1/2 py-2 font-semibold rounded-xl bg-white shadow-sm text-orange-700 transition">Masuk</button>

                <!-- Login form -->
                <div id="loginFormArea">
                    <div class="mb-3"><input type="text" id="loginUsername" placeholder="Username" class="w-full p-3 border border-orange-200 rounded-2xl bg-white/80"></div>
                    <div class="mb-5 relative"><input type="password" id="loginPassword" placeholder="Password" class="w-full p-3 border border-orange-200 rounded-2xl pr-10 bg-white/80"><i class="fas fa-eye-slash toggle-pwd absolute right-4 top-1/2 -translate-y-1/2" id="toggleLoginPass"></i></div>
                    <button id="doLoginBtn" class="w-full btn-soft text-white py-3 rounded-2xl font-bold text-lg shadow-lg">Login Sekarang</button>

                <div id="registerFormArea" class="hidden">
                    <input type="text" id="regFullname" placeholder="Nama Lengkap" class="w-full mb-2 p-3 border border-orange-200 rounded-2xl">

                    <input type="text" id="regPhone" placeholder="Nomor Telepon" class="w-full mb-2 p-3 border border-orange-200 rounded-2xl">

                    <div class="relative mb-4"><input type="password" id="regPassword" placeholder="Password" class="w-full p-3 border border-orange-200 rounded-2xl pr-10"><i class="fas fa-eye-slash toggle-pwd absolute right-4 top-1/2 -translate-y-1/2" id="toggleRegPass"></i></div>
                    <button id="doRegisterBtn" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-2xl font-bold transition shadow">Daftar Anggota</button>
                </div>
                <p class="text-xs text-center text-orange-500 mt-6">Demo: admin / admin123 | atau daftar anggota baru</p>
            </div>
        </div>

        <!-- DASHBOARD UTAMA -->
        <div id="dashboardMain" class="hidden">
            <div class="glass-elegant p-4 flex flex-wrap justify-between items-center mb-6 rounded-2xl">
                <div class="flex items-center gap-3"><i class="fas fa-feather-alt text-3xl text-amber-600"></i><div><h1 class="text-2xl font-black text-stone-800">Perpus Digital</h1><p class="text-sm text-stone-500">Selamat datang, <span id="greetUserName" class="font-semibold text-orange-700"></span> · <span id="roleBadgeSpan" class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full text-xs"></span></p></div></div>
                <button id="logoutGlobalBtn" class="bg-stone-200 hover:bg-stone-300 text-stone-700 px-4 py-2 rounded-full shadow-sm transition"><i class="fas fa-sign-out-alt"></i> Keluar</button>
            </div>
            <div id="dynamicNavTabs" class="flex flex-wrap gap-2 mb-6"></div>
            <div id="dynamicContentPanel" class="glass-elegant p-5 min-h-[500px] transition-all"><div class="text-center text-amber-600"><i class="fas fa-spinner fa-pulse mr-2"></i> Memuat portal...</div></div>
        </div>
    </div>

    <footer class="relative z-10 text-center py-4 text-stone-500 text-sm border-t border-orange-200/60 bg-white/30 backdrop-blur-sm mt-6"><div class="container mx-auto px-4"><i class="fas fa-book me-1 text-orange-500"></i> e-Library Senja • Platform literasi digital SMK Insan Cemerlang</div></footer>

    <!-- MODAL GLOBAL -->
    <div id="universalModal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-bg transition-all" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);"><div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl"><div class="flex justify-between items-center mb-4"><h3 id="modalTitleDynamic" class="text-xl font-bold text-amber-700"></h3><button id="closeUniversalModal" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div><div id="modalBodyDynamic"></div><div class="mt-5 flex justify-end gap-3"><button id="modalCancelDynamic" class="px-4 py-2 border border-amber-300 rounded-xl text-amber-600">Batal</button><button id="modalConfirmDynamic" class="px-4 py-2 bg-orange-500 text-white rounded-xl hover:bg-orange-600">Simpan</button></div></div></div>
    <!-- Payment Modal (denda) -->
    <div id="paymentFineModal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-bg transition-all" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);"><div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-amber-700">Bayar Denda</h3><button id="closePayModalBtn" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div><div id="paymentBodyModal"></div><div class="mt-5 flex justify-end gap-2"><button id="cancelPayBtn" class="px-4 py-2 border border-amber-300 rounded-xl text-amber-600">Batal</button><button id="confirmPayBtn" class="px-4 py-2 bg-orange-500 text-white rounded-xl hover:bg-orange-600">Kirim Bukti</button></div></div></div>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, getDocs, getDoc, addDoc, deleteDoc, updateDoc, query, orderBy, where } from 'firebase/firestore';

        // ----- FIREBASE KONFIGURASI BARU (sesuai permintaan) -----
        const firebaseConfig = {
            apiKey: "AIzaSyAR8nOkH-0Ik8fwcEMgjsnqKXMvR-qQqUk",
            authDomain: "insancemerlang-3b037.firebaseapp.com",
            projectId: "insancemerlang-3b037",
            storageBucket: "insancemerlang-3b037.firebasestorage.app",
            messagingSenderId: "150953324871",
            appId: "1:150953324871:web:fe3d3214ce3bc6e1121c62",
            measurementId: "G-1R8MDPMGPK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Collections
        const booksCollection = collection(db, "books");
        const membersCollection = collection(db, "members");
        const usersCollection = collection(db, "users");
        const loansCollection = collection(db, "loans");
        const returnsCollection = collection(db, "returns");
        const DAILY_FINE = 1000;

        let currentUser = null;
        let activeModalCallback = null;
        
        // helper functions
        function formatDateShort(dateVal) { if(!dateVal) return '-'; return new Date(dateVal).toLocaleDateString('id-ID'); }
        function getDueDateFromLoan(loanDateISO) { const due = new Date(loanDateISO); due.setDate(due.getDate() + 7); return due.toISOString(); }
        function isOverdue(dueISO) { return new Date() > new Date(dueISO); }
        function calcLateFee(dueISO, returnISO) { const due = new Date(dueISO), ret = new Date(returnISO); if(ret <= due) return 0; const daysLate = Math.ceil((ret - due) / (1000*60*60*24)); return daysLate * DAILY_FINE; }
        function showNotif(msg, isErr = false) { const toast = document.createElement("div"); toast.className = `fixed bottom-5 right-5 z-50 px-5 py-3 rounded-2xl shadow-lg text-white font-semibold flex items-center gap-2 ${isErr ? 'bg-red-500' : 'bg-orange-500'}`; toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-circle-check'}"></i> ${msg}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
        
        // data cache ringan
        let cachedBooks = [], cachedMembers = [], lastFetch = 0;
        async function refreshBooks() { const snap = await getDocs(query(booksCollection, orderBy("title"))); cachedBooks = snap.docs.map(d => ({ id: d.id, ...d.data() })); return cachedBooks; }
        async function refreshMembers() { const snap = await getDocs(query(membersCollection, orderBy("name"))); cachedMembers = snap.docs.map(d => ({ id: d.id, ...d.data() })); return cachedMembers; }
        
        async function getLoansWithDetails() {
            const loansSnap = await getDocs(query(loansCollection, orderBy("loanDate", "desc")));
            const loans = loansSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            if(!loans.length) return [];
            const bookIds = [...new Set(loans.map(l=>l.bookId).filter(Boolean))];
            const memberIds = [...new Set(loans.map(l=>l.memberId).filter(Boolean))];
            const [bookMap, memberMap] = await Promise.all([
                (async () => { const m = new Map(); for(let id of bookIds) { const docSnap = await getDoc(doc(booksCollection, id)); if(docSnap.exists()) m.set(id, docSnap.data()); } return m; })(),
                (async () => { const m = new Map(); for(let id of memberIds) { const docSnap = await getDoc(doc(membersCollection, id)); if(docSnap.exists()) m.set(id, docSnap.data()); } return m; })()
            ]);
            return loans.map(l => ({ ...l, bookTitle: bookMap.get(l.bookId)?.title || 'Tidak diketahui', bookCover: bookMap.get(l.bookId)?.cover || '📚', memberName: memberMap.get(l.memberId)?.name || '-' }));
        }
        
        async function getReturnsWithDetails() {
            const retSnap = await getDocs(query(returnsCollection, orderBy("returnDate", "desc")));
            const returns = retSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            if(!returns.length) return [];
            const loanIds = returns.map(r=>r.loanId);
            const loansMap = new Map();
            for(let lid of loanIds) { const ld = await getDoc(doc(loansCollection, lid)); if(ld.exists()) loansMap.set(lid, ld.data()); }
            const enriched = [];
            for(let ret of returns) {
                const loan = loansMap.get(ret.loanId);
                if(loan) {
                    const bookSnap = await getDoc(doc(booksCollection, loan.bookId));
                    const memberSnap = await getDoc(doc(membersCollection, loan.memberId));
                    enriched.push({ ...ret, bookTitle: bookSnap.exists() ? bookSnap.data().title : '-', memberName: memberSnap.exists() ? memberSnap.data().name : '-', loanDate: loan.loanDate, dueDate: loan.dueDate });
                } else { enriched.push({ ...ret, bookTitle: '-', memberName: '-', loanDate: null, dueDate: null }); }
            }
            return enriched;
        }

        async function seedInitial() {
            const adminQuery = query(usersCollection, where("username", "==", "admin"));
            if((await getDocs(adminQuery)).empty) await addDoc(usersCollection, { username: "admin", password: "admin123", role: "admin", memberId: null });
            if((await getDocs(booksCollection)).empty) {
                await addDoc(booksCollection, { title: "Filsafat Kode", publisher: "Kanaka Media", totalStock: 6, availableStock: 6, cover: "📘" });
                await addDoc(booksCollection, { title: "UX Research", publisher: "Inovasi", totalStock: 4, availableStock: 4, cover: "🎨" });
                await addDoc(booksCollection, { title: "Cloud Computing", publisher: "Digital Press", totalStock: 3, availableStock: 3, cover: "☁️" });
            }
            if((await getDocs(membersCollection)).empty) {
                const mRef = await addDoc(membersCollection, { name: "Rina Safitri", className: "XI RPL 2", phone: "08512345678", registerDate: new Date().toISOString() });
                await addDoc(usersCollection, { username: "rina", password: "rina123", role: "member", memberId: mRef.id });
            }
        }
        seedInitial();

        // UI helpers
        function openModal(title, html, onConfirm) { document.getElementById("modalTitleDynamic").innerText = title; document.getElementById("modalBodyDynamic").innerHTML = html; document.getElementById("universalModal").classList.remove("hidden"); activeModalCallback = onConfirm; }
        function closeModal() { document.getElementById("universalModal").classList.add("hidden"); activeModalCallback = null; }
        document.getElementById("closeUniversalModal").onclick = closeModal; document.getElementById("modalCancelDynamic").onclick = closeModal;
        document.getElementById("modalConfirmDynamic").onclick = () => { if(activeModalCallback) activeModalCallback(); closeModal(); };
        
        // toggle password
        function attachPwdToggle(toggleId, inputId) { const toggle = document.getElementById(toggleId); const inp = document.getElementById(inputId); if(toggle && inp) toggle.addEventListener('click', () => { const type = inp.getAttribute('type') === 'password' ? 'text' : 'password'; inp.setAttribute('type', type); toggle.classList.toggle('fa-eye'); toggle.classList.toggle('fa-eye-slash'); }); }
        attachPwdToggle('toggleLoginPass','loginPassword'); attachPwdToggle('toggleRegPass','regPassword');
        
        // login handler
        async function loginUser(username, pwd) {
            if(!username || !pwd) { showNotif("Username & password harus diisi", true); return false; }
            const q = query(usersCollection, where("username","==",username), where("password","==",pwd));
            const snap = await getDocs(q);
            if(snap.empty) { showNotif("Login gagal, periksa kembali", true); return false; }
            currentUser = { id: snap.docs[0].id, ...snap.docs[0].data() };
            localStorage.setItem("eLibraryUser", JSON.stringify({ id: currentUser.id, username: currentUser.username, role: currentUser.role, memberId: currentUser.memberId }));
            showNotif(`Selamat datang, ${currentUser.username}`);
            renderMainDashboard();
            return true;
        }
        
        async function registerMember(name, kelas, telp, username, pwd) {
            if(!name || !kelas || !username || !pwd) { showNotif("Semua field wajib diisi", true); return false; }
            const existing = await getDocs(query(usersCollection, where("username","==",username)));
            if(!existing.empty) { showNotif("Username sudah digunakan", true); return false; }
            const memberRef = await addDoc(membersCollection, { name, className: kelas, phone: telp, registerDate: new Date().toISOString() });
            await addDoc(usersCollection, { username, password: pwd, role: "member", memberId: memberRef.id });
            showNotif("Pendaftaran berhasil! Silakan login.");
            return true;
        }
        
        // dashboard & navigation
        async function renderMainDashboard() {
            document.getElementById("authWrapper").classList.add("hidden"); document.getElementById("dashboardMain").classList.remove("hidden");
            document.getElementById("greetUserName").innerText = currentUser.username;
            document.getElementById("roleBadgeSpan").innerHTML = currentUser.role === 'admin' ? '<i class="fas fa-crown"></i> Administrator' : '<i class="fas fa-user-friends"></i> Anggota Aktif';
            const navContainer = document.getElementById("dynamicNavTabs"); navContainer.innerHTML = "";
            if(currentUser.role === 'admin') {
                const adminMenus = [
                    { id: "adminBooks", label: "📖 Koleksi Buku", icon: "fa-book-open" }, { id: "adminMembers", label: "👥 Manajemen Anggota", icon: "fa-users" },
                    { id: "adminLoans", label: "📌 Sirkulasi Peminjaman", icon: "fa-hand-holding" }, { id: "adminReturns", label: "🔄 Riwayat Pengembalian", icon: "fa-history" },
                    { id: "adminFines", label: "💰 Denda Tertunda", icon: "fa-coins" }
                ];
                adminMenus.forEach(menu => { const btn = document.createElement("button"); btn.className = "px-4 py-2 rounded-full bg-amber-100/60 hover:bg-amber-200/70 text-amber-800 font-medium transition flex items-center gap-2 shadow-sm"; btn.innerHTML = `<i class="fas ${menu.icon}"></i> ${menu.label}`; btn.onclick = () => renderAdminSection(menu.id); navContainer.appendChild(btn); });
                renderAdminSection("adminBooks");
            } else {
                const userMenus = [
                    { id: "userBorrow", label: "📘 Pinjam Buku", icon: "fa-book" }, { id: "userLoans", label: "📋 Peminjamanku", icon: "fa-list" },
                    { id: "userReturn", label: "↩️ Kembalikan", icon: "fa-undo-alt" }, { id: "userFines", label: "💸 Denda Saya", icon: "fa-money-bill-wave" }
                ];
                userMenus.forEach(menu => { const btn = document.createElement("button"); btn.className = "px-4 py-2 rounded-full bg-amber-100/60 hover:bg-amber-200/70 text-amber-800 font-medium transition flex items-center gap-2"; btn.innerHTML = `<i class="fas ${menu.icon}"></i> ${menu.label}`; btn.onclick = () => renderUserSection(menu.id); navContainer.appendChild(btn); });
                renderUserSection("userBorrow");
            }
        }
        
        // ----- ADMIN SECTIONS (Ringkas & rapi) -----
        async function renderAdminSection(section) { const container = document.getElementById("dynamicContentPanel"); if(section === "adminBooks") await renderAdminBooks(container); else if(section === "adminMembers") await renderAdminMembers(container); else if(section === "adminLoans") await renderAdminLoans(container); else if(section === "adminReturns") await renderAdminReturns(container); else if(section === "adminFines") await renderAdminFines(container); }
        
        async function renderAdminBooks(container) {
            let books = await refreshBooks();
            container.innerHTML = `<div class="flex justify-between items-center flex-wrap mb-4"><h2 class="text-2xl font-bold text-amber-700"><i class="fas fa-layer-group"></i> Koleksi Buku</h2><button id="createBookBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl shadow-md"><i class="fas fa-plus-circle"></i> Tambah Buku</button></div><div class="overflow-x-auto"><table class="w-full table-modern bg-white/50 rounded-2xl"><thead class="bg-amber-50"><tr><th>Cover</th><th>Judul</th><th>Penerbit</th><th>Stok</th><th>Tersedia</th><th>Aksi</th></tr></thead><tbody id="bookListAdminBody"></tbody></table></div>`;
            const renderTable = () => { document.getElementById("bookListAdminBody").innerHTML = books.map(b => `<tr><td class="text-3xl">${b.cover||'📚'}</td><td class="font-semibold">${b.title}</td><td>${b.publisher||'-'}</td><td>${b.totalStock}</td><td>${b.availableStock}</td><td><button data-id="${b.id}" class="editBookBtn text-orange-600 mr-2"><i class="fas fa-edit"></i></button><button data-id="${b.id}" class="delBookBtn text-red-500"><i class="fas fa-trash-alt"></i></button></td></tr>`).join(''); document.querySelectorAll(".editBookBtn").forEach(btn => btn.onclick = () => editBook(btn.dataset.id)); document.querySelectorAll(".delBookBtn").forEach(btn => btn.onclick = () => deleteBookById(btn.dataset.id)); }; renderTable();
            document.getElementById("createBookBtn").onclick = () => openModal("Buku Baru", `<div><label class="block">Cover (emoji)</label><input id="bookCoverEmoji" class="w-full border rounded-xl p-2 mb-2" value="📖"><label>Judul</label><input id="bookTitleInp" class="w-full border rounded-xl p-2 mb-2"><label>Penerbit</label><input id="bookPubInp" class="w-full border rounded-xl p-2 mb-2"><label>Stok Total</label><input id="bookStockInp" type="number" class="w-full border rounded-xl p-2"></div>`, async () => { const title = document.getElementById("bookTitleInp").value; const total = parseInt(document.getElementById("bookStockInp").value); if(!title || isNaN(total)) return showNotif("Data tidak lengkap", true); await addDoc(booksCollection, { title, publisher: document.getElementById("bookPubInp").value, totalStock: total, availableStock: total, cover: document.getElementById("bookCoverEmoji").value }); books = await refreshBooks(); renderTable(); showNotif("Buku tersimpan"); });
            window.editBook = async (id) => { const ref = doc(booksCollection, id); const snap = (await getDoc(ref)).data(); openModal("Edit Buku", `<div><label>Cover</label><input id="editCover" value="${snap.cover||'📚'}" class="w-full border p-2 rounded"><label>Judul</label><input id="editTitle" value="${snap.title}" class="w-full border p-2 rounded"><label>Penerbit</label><input id="editPub" value="${snap.publisher||''}" class="w-full border p-2 rounded"><label>Stok Total</label><input id="editStock" type="number" value="${snap.totalStock}" class="w-full border p-2 rounded"></div>`, async () => { const newTotal = parseInt(document.getElementById("editStock").value); const diff = newTotal - snap.totalStock; await updateDoc(ref, { cover: document.getElementById("editCover").value, title: document.getElementById("editTitle").value, publisher: document.getElementById("editPub").value, totalStock: newTotal, availableStock: snap.availableStock + diff }); books = await refreshBooks(); renderTable(); showNotif("Update sukses"); }); };
            window.deleteBookById = async (id) => { if(confirm("Hapus buku ini?")) { await deleteDoc(doc(booksCollection, id)); books = await refreshBooks(); renderTable(); showNotif("Terhapus"); } };
        }
        
        async function renderAdminMembers(container) { let members = await refreshMembers(); let usersSnap = await getDocs(usersCollection); const usersMap = new Map(); usersSnap.docs.forEach(d => { if(d.data().memberId) usersMap.set(d.data().memberId, d.data()); });
            container.innerHTML = `<h2 class="text-2xl font-bold mb-3 text-amber-700"><i class="fas fa-id-card"></i> Data Anggota</h2><button id="newMemberBtn" class="bg-orange-500 text-white px-4 py-2 rounded-xl mb-4">+ Tambah Anggota</button><div class="overflow-x-auto"><table class="w-full table-modern bg-white/60 rounded-2xl"><thead class="bg-amber-50"><tr><th>Nama</th><th>Kelas</th><th>Telepon</th><th>Username</th><th>Status Pinjam</th><th>Aksi</th></tr></thead><tbody id="memberTableBody"></tbody></table></div>`;
            const renderMemberTable = async () => { const loans = await getLoansWithDetails(); const activeMap = new Map(); loans.filter(l=>l.status==='borrowed').forEach(l=>{ if(l.memberId) activeMap.set(l.memberId, (activeMap.get(l.memberId)||0)+1); });
                document.getElementById("memberTableBody").innerHTML = members.map(m => { const user = usersMap.get(m.id); return `<tr><td>${m.name}</td><td>${m.className}</td><td>${m.phone}</td><td>${user?.username || '-'}</td><td><span class="badge-soft">${activeMap.get(m.id)||0} buku</span></td><td><button data-id="${m.id}" class="editMember text-orange-600 mr-2"><i class="fas fa-edit"></i></button><button data-id="${m.id}" class="delMember text-red-500"><i class="fas fa-trash"></i></button></td></tr>`; }).join('');
                document.querySelectorAll(".editMember").forEach(btn => btn.onclick = () => editMemberById(btn.dataset.id)); document.querySelectorAll(".delMember").forEach(btn => btn.onclick = () => deleteMemberById(btn.dataset.id)); };
            renderMemberTable();
            document.getElementById("newMemberBtn").onclick = () => openModal("Registrasi Anggota", `<div><input id="regNm" placeholder="Nama" class="w-full border p-2 mb-2 rounded"><input id="regKls" placeholder="Kelas" class="w-full border p-2 mb-2"><input id="regTel" placeholder="Telepon" class="w-full border p-2 mb-2"><input id="regUsr" placeholder="Username" class="w-full border p-2 mb-2"><input id="regPwd" type="password" placeholder="Password" class="w-full border p-2 rounded"></div>`, async () => { const name=document.getElementById("regNm").value, cls=document.getElementById("regKls").value, tel=document.getElementById("regTel").value, usr=document.getElementById("regUsr").value, pwd=document.getElementById("regPwd").value; if(!name||!cls||!usr||!pwd) return showNotif("Lengkapi data", true); const existing=await getDocs(query(usersCollection, where("username","==",usr))); if(!existing.empty) return showNotif("Username dipakai", true); const memRef=await addDoc(membersCollection,{name,className:cls,phone:tel,registerDate:new Date().toISOString()}); await addDoc(usersCollection,{username:usr,password:pwd,role:"member",memberId:memRef.id}); members=await refreshMembers(); renderMemberTable(); showNotif("Anggota ditambahkan"); });
            window.editMemberById = async (id) => { const memDoc = await getDoc(doc(membersCollection, id)); const data = memDoc.data(); const userQ = await getDocs(query(usersCollection, where("memberId","==",id))); let username='',password=''; if(!userQ.empty) { username=userQ.docs[0].data().username; password=userQ.docs[0].data().password; } openModal("Edit Anggota", `<div><input id="editName" value="${data.name}" class="w-full p-2 border rounded mb-2"><input id="editClass" value="${data.className}" class="w-full p-2 border rounded mb-2"><input id="editPhone" value="${data.phone}" class="w-full p-2 border rounded mb-2"><input id="editUsr" value="${username}" class="w-full p-2 border rounded mb-2"><input id="editPwd" value="${password}" class="w-full p-2 border rounded"></div>`, async () => { await updateDoc(doc(membersCollection, id), { name: document.getElementById("editName").value, className: document.getElementById("editClass").value, phone: document.getElementById("editPhone").value }); if(!userQ.empty) await updateDoc(doc(usersCollection, userQ.docs[0].id), { username: document.getElementById("editUsr").value, password: document.getElementById("editPwd").value }); members=await refreshMembers(); renderMemberTable(); showNotif("Update berhasil"); }); };
            window.deleteMemberById = async (id) => { if(!confirm("Hapus anggota?")) return; const userQ = await getDocs(query(usersCollection, where("memberId","==",id))); if(!userQ.empty) await deleteDoc(doc(usersCollection, userQ.docs[0].id)); await deleteDoc(doc(membersCollection, id)); members=await refreshMembers(); renderMemberTable(); showNotif("Dihapus"); };
        }
        
        async function renderAdminLoans(container) { let loans = await getLoansWithDetails(); let books = cachedBooks.length?cachedBooks:await refreshBooks(); let members = cachedMembers.length?cachedMembers:await refreshMembers();
            container.innerHTML = `<div class="flex justify-between"><h2 class="text-2xl font-bold text-amber-700">Peminjaman Aktif</h2><button id="createLoanBtn" class="bg-orange-500 text-white px-4 py-2 rounded-xl">+ Pinjam Buku</button></div><div class="overflow-x-auto mt-3"><table class="w-full table-modern"><thead><tr><th>Peminjam</th><th>Buku</th><th>Tgl Pinjam</th><th>Jatuh Tempo</th><th>Status</th><th>Aksi</th></tr></thead><tbody>${loans.map(l=>`<tr><td>${l.memberName}</td><td>${l.bookTitle}</td><td>${formatDateShort(l.loanDate)}</td><td>${formatDateShort(l.dueDate)}</td><td><span class="badge-soft">${l.status==='borrowed'?'Dipinjam':'Kembali'}</span></td><td>${l.status==='borrowed'?`<button data-id="${l.id}" class="returnLoanBtnAdmin bg-emerald-600 text-white px-2 py-1 rounded">Kembalikan</button>`:'-'}</td></tr>`).join('')}</tbody></table></div>`;
            document.querySelectorAll(".returnLoanBtnAdmin").forEach(btn=>btn.onclick=async()=>{ const loanId=btn.dataset.id; const loanSnap=await getDoc(doc(loansCollection, loanId)); if(!loanSnap.exists()) return; const data=loanSnap.data(); const retDate=new Date().toISOString(); const fee=calcLateFee(data.dueDate, retDate); await addDoc(returnsCollection, { loanId, returnDate:retDate, lateFee:fee, finePaid:false, paymentProof:null }); await updateDoc(doc(loansCollection, loanId), { status:"returned", returnDate:retDate }); const bookRef=doc(booksCollection, data.bookId); const book=await getDoc(bookRef); if(book.exists()) await updateDoc(bookRef, { availableStock: book.data().availableStock+1 }); showNotif(fee?`Denda Rp${fee.toLocaleString()}`:"Pengembalian sukses"); renderAdminLoans(container); });
            document.getElementById("createLoanBtn").onclick = () => openModal("Form Peminjaman", `<select id="loanMemberSelect" class="w-full p-2 border rounded mb-2">${members.map(m=>`<option value="${m.id}">${m.name}</option>`)}</select><select id="loanBookSelect" class="w-full p-2 border rounded">${books.map(b=>`<option value="${b.id}">${b.title} (stok ${b.availableStock})</option>`)}</select>`, async()=>{ const memberId=document.getElementById("loanMemberSelect").value; const bookId=document.getElementById("loanBookSelect").value; const bookDoc=await getDoc(doc(booksCollection, bookId)); if(bookDoc.data().availableStock<=0) return showNotif("Stok habis", true); const loanDate=new Date().toISOString(); await addDoc(loansCollection, { bookId, memberId, loanDate, dueDate:getDueDateFromLoan(loanDate), status:"borrowed" }); await updateDoc(doc(booksCollection, bookId), { availableStock: bookDoc.data().availableStock-1 }); showNotif("Peminjaman berhasil"); renderAdminLoans(container); });
        }
        
        async function renderAdminReturns(container) { let returns = await getReturnsWithDetails(); container.innerHTML = `<h2 class="text-2xl font-bold mb-3">Riwayat Pengembalian</h2><table class="w-full table-modern"><thead><tr><th>Anggota</th><th>Buku</th><th>Tgl Kembali</th><th>Denda</th><th>Lunas</th></tr></thead><tbody>${returns.map(r=>`<tr><td>${r.memberName}</td><td>${r.bookTitle}</td><td>${formatDateShort(r.returnDate)}</td><td class="text-red-600">Rp${(r.lateFee||0).toLocaleString()}</td><td>${r.finePaid?'✅ Lunas':'❌ Belum'}</td></tr>`).join('')}</tbody></table>`; }
        async function renderAdminFines(container) { let returns = await getReturnsWithDetails(); let unpaid = returns.filter(r=>r.lateFee>0 && !r.finePaid); container.innerHTML = `<h2 class="text-2xl font-bold mb-3">Denda Tertunda</h2><table class="w-full table-modern"><thead><tr><th>Peminjam</th><th>Buku</th><th>Denda</th><th>Aksi</th></tr></thead><tbody>${unpaid.map(r=>`<tr><td>${r.memberName}</td><td>${r.bookTitle}</td><td>Rp${r.lateFee.toLocaleString()}</td><td><button data-id="${r.id}" class="markPaidBtnAdmin bg-orange-500 text-white px-3 py-1 rounded">Tandai Lunas</button></td></tr>`).join('')}</tbody></table>`;
            document.querySelectorAll(".markPaidBtnAdmin").forEach(btn=>btn.onclick=async()=>{ await updateDoc(doc(returnsCollection, btn.dataset.id), { finePaid: true }); showNotif("Denda dilunaskan"); renderAdminFines(container); }); }
        
        // user section (ringkas, seperti fitur utama)
        async function renderUserSection(section) { const container=document.getElementById("dynamicContentPanel"); if(section==="userBorrow") await renderUserBorrow(container); else if(section==="userLoans") await renderUserLoans(container); else if(section==="userReturn") await renderUserReturn(container); else if(section==="userFines") await renderUserFines(container); }
        async function renderUserBorrow(container) { let books = await refreshBooks(); if(!currentUser.memberId) return; container.innerHTML = `<h2 class="text-2xl font-bold mb-3">📗 Pinjam Buku</h2><div class="grid md:grid-cols-3 gap-4" id="userBookGrid"></div>`; const renderGrid = (filtered) => { document.getElementById("userBookGrid").innerHTML = filtered.map(b=>`<div class="bg-white/70 p-4 rounded-2xl shadow"><div class="text-5xl">${b.cover}</div><div class="font-bold">${b.title}</div><div>Stok: ${b.availableStock}</div>${b.availableStock>0?`<button data-id="${b.id}" class="borrowUserAct w-full mt-2 bg-orange-500 text-white py-2 rounded-xl">Pinjam</button>`:'<button disabled class="w-full bg-gray-300 py-2 rounded-xl">Habis</button>'}</div>`).join(''); document.querySelectorAll(".borrowUserAct").forEach(btn=>btn.onclick=async()=>{ const bookId=btn.dataset.id; const bookRef=doc(booksCollection, bookId); const book=await getDoc(bookRef); if(book.data().availableStock<=0) return showNotif("Stok kosong", true); const existing=await getDocs(query(loansCollection, where("memberId","==",currentUser.memberId), where("bookId","==",bookId), where("status","==","borrowed"))); if(!existing.empty) return showNotif("Anda masih meminjam buku ini", true); const loanDate=new Date().toISOString(); await addDoc(loansCollection, { bookId, memberId:currentUser.memberId, loanDate, dueDate:getDueDateFromLoan(loanDate), status:"borrowed" }); await updateDoc(bookRef, { availableStock: book.data().availableStock-1 }); showNotif("Buku berhasil dipinjam"); renderUserBorrow(container); }); }; renderGrid(books); }
        async function renderUserLoans(container) { let all = await getLoansWithDetails(); let mine = all.filter(l=>l.memberId===currentUser.memberId); container.innerHTML = `<h2 class="text-2xl font-bold mb-3">📌 Peminjaman Saya</h2><table class="w-full table-modern"><thead><tr><th>Buku</th><th>Tgl Pinjam</th><th>Jatuh Tempo</th><th>Status</th></tr></thead><tbody>${mine.map(l=>`<tr><td>${l.bookTitle}</td><td>${formatDateShort(l.loanDate)}</td><td>${formatDateShort(l.dueDate)}</td><td>${l.status==='borrowed'?'Aktif':'Dikembalikan'}</td></tr>`).join('')}</tbody></table>`; }
        async function renderUserReturn(container) { let all = await getLoansWithDetails(); let active = all.filter(l=>l.memberId===currentUser.memberId && l.status==='borrowed'); container.innerHTML = `<h2 class="text-2xl font-bold mb-3">↩️ Kembalikan Buku</h2><div>${active.map(l=>`<div class="bg-white/70 p-3 rounded-xl mb-2 flex justify-between"><div><b>${l.bookTitle}</b><br><span class="text-sm">Jatuh tempo: ${formatDateShort(l.dueDate)}</span></div><button data-id="${l.id}" class="returnUserAct bg-orange-500 text-white px-4 py-2 rounded-xl">Kembalikan</button></div>`).join('')}</div>`; document.querySelectorAll(".returnUserAct").forEach(btn=>btn.onclick=async()=>{ const loanId=btn.dataset.id; const loanSnap=await getDoc(doc(loansCollection, loanId)); const data=loanSnap.data(); const retDate=new Date().toISOString(); const fee=calcLateFee(data.dueDate, retDate); await addDoc(returnsCollection, { loanId, returnDate:retDate, lateFee:fee, finePaid:false }); await updateDoc(doc(loansCollection, loanId), { status:"returned", returnDate:retDate }); const bookRef=doc(booksCollection, data.bookId); const book=await getDoc(bookRef); if(book.exists()) await updateDoc(bookRef, { availableStock: book.data().availableStock+1 }); showNotif(fee?`Denda Rp${fee.toLocaleString()} silakan bayar`:"Kembali berhasil"); renderUserReturn(container); }); }
        async function renderUserFines(container) { let allReturns = await getReturnsWithDetails(); let userLoans = await getLoansWithDetails(); let myLoanIds = userLoans.filter(l=>l.memberId===currentUser.memberId).map(l=>l.id); let myFines = allReturns.filter(r=>myLoanIds.includes(r.loanId) && r.lateFee>0); container.innerHTML = `<h2 class="text-2xl font-bold mb-3">Denda Saya</h2><table class="w-full table-modern"><thead><tr><th>Buku</th><th>Denda</th><th>Status</th><th>Aksi</th></tr></thead><tbody>${myFines.map(f=>`<tr><td>${f.bookTitle}</td><td class="text-red-600">Rp${f.lateFee.toLocaleString()}</td><td>${f.finePaid?'Lunas':'Belum'}</td><td>${!f.finePaid?`<button data-id="${f.id}" class="payFineUserBtn bg-green-600 text-white px-3 py-1 rounded">Bayar</button>`:'-'}</td></tr>`).join('')}</tbody></table>`; document.querySelectorAll(".payFineUserBtn").forEach(btn=>btn.onclick=()=>showPaymentModal(btn.dataset.id)); }
        
        function showPaymentModal(returnId) { const modal=document.getElementById("paymentFineModal"); document.getElementById("paymentBodyModal").innerHTML=`<div class="mb-3"><p>Upload bukti transfer (QRIS/BCA)</p><input type="file" id="proofUploadFine" accept="image/*" class="w-full border p-2 rounded"></div><div class="text-xs text-stone-500">Rekening BCA: 9876543210 a/n Perpus Digital</div>`; modal.classList.remove("hidden"); document.getElementById("confirmPayBtn").onclick = async()=>{ const fileInput=document.getElementById("proofUploadFine"); if(!fileInput.files.length) return showNotif("Upload bukti", true); const reader=new FileReader(); reader.onload=async(e)=>{ await updateDoc(doc(returnsCollection, returnId), { paymentProof:e.target.result, finePaid:true }); showNotif("Bukti terkirim, admin akan konfirmasi"); modal.classList.add("hidden"); renderUserFines(document.getElementById("dynamicContentPanel")); }; reader.readAsDataURL(fileInput.files[0]); }; document.getElementById("closePayModalBtn").onclick=()=>modal.classList.add("hidden"); document.getElementById("cancelPayBtn").onclick=()=>modal.classList.add("hidden"); }
        
        // event listeners
        document.getElementById("doLoginBtn").onclick = () => loginUser(document.getElementById("loginUsername").value, document.getElementById("loginPassword").value);
        document.getElementById("doRegisterBtn").onclick = () => registerMember(document.getElementById("regFullname").value, document.getElementById("regClass").value, document.getElementById("regPhone").value, document.getElementById("regUsername").value, document.getElementById("regPassword").value);
        document.getElementById("loginTabBtn").onclick = () => { document.getElementById("loginFormArea").classList.remove("hidden"); document.getElementById("registerFormArea").classList.add("hidden"); document.getElementById("loginTabBtn").classList.add("bg-white","shadow","text-orange-700"); document.getElementById("registerTabBtn").classList.remove("bg-white","shadow"); };
        document.getElementById("registerTabBtn").onclick = () => { document.getElementById("registerFormArea").classList.remove("hidden"); document.getElementById("loginFormArea").classList.add("hidden"); document.getElementById("registerTabBtn").classList.add("bg-white","shadow","text-orange-700"); document.getElementById("loginTabBtn").classList.remove("bg-white","shadow"); };
        document.getElementById("logoutGlobalBtn").onclick = () => { localStorage.removeItem("eLibraryUser"); currentUser=null; document.getElementById("dashboardMain").classList.add("hidden"); document.getElementById("authWrapper").classList.remove("hidden"); showNotif("Keluar dari sistem"); };
        const savedUser = localStorage.getItem("eLibraryUser"); if(savedUser) { try{ currentUser=JSON.parse(savedUser); renderMainDashboard(); }catch(e){} }
    </script>
</body>
</html>
