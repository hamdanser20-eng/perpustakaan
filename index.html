    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        * { font-family: 'Space Grotesk', 'Poppins', sans-serif; }
        
        .bg-gradient-cyber {
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            background-attachment: fixed;
        }
        
        .glass-morph {
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(6, 182, 212, 0.3);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
        }
        
        .glass-morph-light {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-cyber {
            background: linear-gradient(95deg, #06b6d4, #3b82f6);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }
        
        .btn-cyber:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.5);
        }
        
        .btn-cyber-secondary {
            background: linear-gradient(95deg, #ec4899, #f43f5e);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }
        
        .btn-cyber-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.5);
        }
        
        .table-cyber td, .table-cyber th {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            vertical-align: middle;
        }
        
        .table-cyber tbody tr {
            transition: all 0.2s;
        }
        
        .table-cyber tbody tr:hover {
            background: rgba(6, 182, 212, 0.1);
            transform: scale(1.01);
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #06b6d4, #3b82f6); border-radius: 10px; }
        
        .input-cyber {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 1rem;
            transition: all 0.2s;
            color: white;

        .input-cyber:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .input-cyber::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -12px rgba(6, 182, 212, 0.3);
        }
        
        .badge-cyber {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(59, 130, 246, 0.2));
            border: 1px solid rgba(6, 182, 212, 0.5);
            border-radius: 9999px;
            padding: 0.25rem 0.75rem;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .floating-element {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }
    </style>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, getDocs, getDoc, addDoc, deleteDoc, updateDoc, query, orderBy, where } from 'firebase/firestore';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAR8nOkH-0Ik8fwcEMgjsnqKXMvR-qQqUk",
            authDomain: "insancemerlang-3b037.firebaseapp.com",
            projectId: "insancemerlang-3b037",
            storageBucket: "insancemerlang-3b037.firebasestorage.app",
            messagingSenderId: "150953324871",
            appId: "1:150953324871:web:fe3d3214ce3bc6e1121c62",
            measurementId: "G-1R8MDPMGPK"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Collections
        const booksCol = collection(db, "books");
        const membersCol = collection(db, "members");
        const usersCol = collection(db, "users");
        const loansCol = collection(db, "loans");
        const returnsCol = collection(db, "returns");
        
        let currentUser = null;
        let modalCallback = null;
        const DAILY_FINE = 1000;
        
        // Helper Functions
        function showToast(msg, isError = false) {
            const toast = document.createElement("div");
            toast.className = `fixed bottom-5 right-5 z-50 px-5 py-3 rounded-xl shadow-2xl text-white font-medium flex items-center gap-2 animate-bounce-slow ${isError ? 'bg-gradient-to-r from-red-500 to-pink-500' : 'bg-gradient-to-r from-cyan-500 to-blue-500'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function formatDate(dateObj) {
            if (!dateObj) return '-';
            return new Date(dateObj).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        }
        
        function getDueDate(loanDate) {
            const due = new Date(loanDate);
            due.setDate(due.getDate() + 7);
            return due.toISOString();
        }
        
        function isOverdue(dueDate) {
            return new Date() > new Date(dueDate);
        }
        
        function calculateLateFee(dueDateStr, returnDateStr) {
            const due = new Date(dueDateStr);
            const ret = new Date(returnDateStr);
            if (ret <= due) return 0;
            const diffDays = Math.ceil((ret - due) / (1000 * 60 * 60 * 24));
            return diffDays * DAILY_FINE;
        }
        
        // Data Cache
        let cachedBooks = [], cachedMembers = [], cachedUsers = [];
        
        async function loadBooksForce() {
            const snap = await getDocs(query(booksCol, orderBy("title")));
            cachedBooks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            return cachedBooks;
        }
        
        async function loadMembersForce() {
            const snap = await getDocs(query(membersCol, orderBy("name")));
            cachedMembers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            return cachedMembers;
        }
        
        async function loadUsersForce() {
            const snap = await getDocs(usersCol);
            cachedUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            return cachedUsers;
        }
        
        async function loadLoans() {
            const loansSnap = await getDocs(query(loansCol, orderBy("loanDate", "desc")));
            const loans = loansSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (loans.length === 0) return [];
            const bookIds = [...new Set(loans.map(l => l.bookId).filter(Boolean))];
            const memberIds = [...new Set(loans.map(l => l.memberId).filter(Boolean))];
            const [booksMap, membersMap] = await Promise.all([
                (async () => { const map = new Map(); for (let id of bookIds) { const ds = await getDoc(doc(booksCol, id)); if (ds.exists()) map.set(ds.id, ds.data()); } return map; })(),
                (async () => { const map = new Map(); for (let id of memberIds) { const ds = await getDoc(doc(membersCol, id)); if (ds.exists()) map.set(ds.id, ds.data()); } return map; })()
            ]);
            return loans.map(loan => ({
                ...loan,
                bookTitle: booksMap.get(loan.bookId)?.title || "-",
                bookCover: booksMap.get(loan.bookId)?.cover || "📖",
                memberName: membersMap.get(loan.memberId)?.name || "-"
            }));
        }
        
        async function loadReturns() {
            const returnsSnap = await getDocs(query(returnsCol, orderBy("returnDate", "desc")));
            const returns = returnsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (returns.length === 0) return [];
            const loanIds = [...new Set(returns.map(r => r.loanId))];
            const loansMap = new Map();
            for (let id of loanIds) { const ds = await getDoc(doc(loansCol, id)); if (ds.exists()) loansMap.set(ds.id, ds.data()); }
            const bookIds = [...new Set([...loansMap.values()].map(loan => loan.bookId))];
            const memberIds = [...new Set([...loansMap.values()].map(loan => loan.memberId))];
            const [booksMap, membersMap] = await Promise.all([
                (async () => { const map = new Map(); for (let id of bookIds) { const ds = await getDoc(doc(booksCol, id)); if (ds.exists()) map.set(ds.id, ds.data()); } return map; })(),
                (async () => { const map = new Map(); for (let id of memberIds) { const ds = await getDoc(doc(membersCol, id)); if (ds.exists()) map.set(ds.id, ds.data()); } return map; })()
            ]);
            return returns.map(ret => {
                const loan = loansMap.get(ret.loanId);
                if (!loan) return { ...ret, bookTitle: "-", memberName: "-", loanDate: "-", dueDate: "-" };
                return {
                    ...ret,
                    bookTitle: booksMap.get(loan.bookId)?.title || "-",
                    memberName: membersMap.get(loan.memberId)?.name || "-",
                    loanDate: loan.loanDate,
                    dueDate: loan.dueDate
                };
            });
        }
        
        async function seedInitialData() {
            try {
                const adminQuery = query(usersCol, where("username", "==", "admin"));
                if ((await getDocs(adminQuery)).empty) {
                    await addDoc(usersCol, { username: "admin", password: "admin123", role: "admin", memberId: null });
                }
                if ((await getDocs(booksCol)).empty) {
                    await addDoc(booksCol, { title: "Cyber Security Essentials", publisher: "TechPress", totalStock: 5, availableStock: 5, cover: "🔒" });
                    await addDoc(booksCol, { title: "AI & Machine Learning", publisher: "FutureLab", totalStock: 4, availableStock: 4, cover: "🤖" });
                    await addDoc(booksCol, { title: "Cloud Architecture", publisher: "CloudPub", totalStock: 3, availableStock: 3, cover: "☁️" });
                }
                if ((await getDocs(membersCol)).empty) {
                    const m1 = await addDoc(membersCol, { name: "Budi Santoso", className: "XI RPL 1", phone: "08123456789", registerDate: new Date().toISOString() });
                    const m2 = await addDoc(membersCol, { name: "Siti Nurhaliza", className: "XII RPL 2", phone: "08234567890", registerDate: new Date().toISOString() });
                    await addDoc(usersCol, { username: "budi", password: "budi123", role: "member", memberId: m1.id });
                    await addDoc(usersCol, { username: "siti", password: "siti123", role: "member", memberId: m2.id });
                }
            } catch(e) { console.error(e); }
        }
        seedInitialData();
        
        function setupPasswordToggle(toggleId, inputId) {
            const toggle = document.getElementById(toggleId);
            const input = document.getElementById(inputId);
            if (toggle && input) {
                toggle.addEventListener('click', () => {
                    const type = input.getAttribute('type');
                    if (type === 'password') {
                        input.setAttribute('type', 'text');
                        toggle.classList.remove('fa-eye-slash');
                        toggle.classList.add('fa-eye');
                    } else {
                        input.setAttribute('type', 'password');
                        toggle.classList.remove('fa-eye');
                        toggle.classList.add('fa-eye-slash');
                    }
                });
            }
        }
        
        async function handleLogin(username, password) {
            if (!username || !password) { showToast("Isi username & password!", true); return false; }
            try {
                const q = query(usersCol, where("username", "==", username), where("password", "==", password));
                const snap = await getDocs(q);
                if (snap.empty) { showToast("Login gagal! Periksa kembali.", true); return false; }
                currentUser = { id: snap.docs[0].id, ...snap.docs[0].data() };
                localStorage.setItem("libflow_user", JSON.stringify({ id: currentUser.id, username: currentUser.username, role: currentUser.role, memberId: currentUser.memberId }));
                showToast(`Welcome back, ${currentUser.username}! 🎉`);
                renderDashboard();
                return true;
            } catch(e) { showToast("Error system", true); return false; }
        }
        
        async function handleRegister(name, className, phone, username, password) {
            if (!name || !className || !username || !password) { showToast("Semua field wajib diisi!", true); return false; }
            try {
                const existing = await getDocs(query(usersCol, where("username", "==", username)));
                if (!existing.empty) { showToast("Username sudah dipakai!", true); return false; }
                const memberRef = await addDoc(membersCol, { name, className, phone, registerDate: new Date().toISOString() });
                await addDoc(usersCol, { username, password, role: "member", memberId: memberRef.id });
                showToast("Registrasi berhasil! Silakan login.");
                return true;
            } catch(e) { showToast("Gagal registrasi", true); return false; }
        }
        
        function openModal(title, bodyHtml, onConfirm) {
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalBody").innerHTML = bodyHtml;
            document.getElementById("modalForm").classList.remove("hidden");
            modalCallback = onConfirm;
        }
        
        function closeModal() {
            document.getElementById("modalForm").classList.add("hidden");
            modalCallback = null;
        }
        
        document.getElementById("closeModalBtn").onclick = closeModal;
        document.getElementById("modalCancelBtn").onclick = closeModal;
        document.getElementById("modalConfirmBtn").onclick = () => { if (modalCallback) modalCallback(); closeModal(); };
        
        // Dashboard Render
        async function renderDashboard() {
            document.getElementById("authSection").classList.add("hidden");
            document.getElementById("dashboardSection").classList.remove("hidden");
            document.getElementById("userNameDisplay").innerText = currentUser.username;
            document.getElementById("userRoleBadge").innerHTML = currentUser.role === 'admin' ? '<i class="fas fa-crown mr-1"></i>Admin' : '<i class="fas fa-user-astronaut mr-1"></i>Member';
            
            const navTabs = document.getElementById("navTabs");
            navTabs.innerHTML = "";
            
            if (currentUser.role === 'admin') {
                const menus = [
                    { id: "adminBooks", label: "📚 Buku", icon: "fa-book" },
                    { id: "adminMembers", label: "👥 Anggota", icon: "fa-users" },
                    { id: "adminLoans", label: "📋 Peminjaman", icon: "fa-hand-holding" },
                    { id: "adminReturns", label: "🔄 Pengembalian", icon: "fa-undo-alt" },
                    { id: "adminFines", label: "💰 Denda", icon: "fa-coins" }
                ];
                menus.forEach(menu => {
                    const btn = document.createElement("button");
                    btn.className = "px-5 py-2.5 rounded-full bg-gray-800/50 hover:bg-cyan-500/20 text-cyan-300 font-medium transition-all flex items-center gap-2 border border-cyan-500/30";
                    btn.innerHTML = `<i class="fas ${menu.icon}"></i> ${menu.label}`;
                    btn.onclick = () => renderAdminContent(menu.id);
                    navTabs.appendChild(btn);
                });
                renderAdminContent("adminBooks");
            } else {

        async function renderAdminLoans(container) {
            let loans = await loadLoans();
            let books = await loadBooksForce();
            let members = await loadMembersForce();
            container.innerHTML = `
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold text-cyan-400"><i class="fas fa-hand-holding mr-2"></i>Peminjaman Aktif</h2><button id="newLoanBtn" class="btn-cyber text-white px-5 py-2 rounded-xl"><i class="fas fa-plus mr-2"></i>Pinjam Buku</button></div>
                <div class="overflow-x-auto"><table class="w-full table-cyber"><thead class="bg-gray-800/50"><tr><th>Peminjam</th><th>Buku</th><th>Tgl Pinjam</th><th>Jatuh Tempo</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="loansTbody"></tbody></table></div>
            `;
            const render = () => {
                document.getElementById("loansTbody").innerHTML = loans.map(l => {
                    const overdue = l.status === 'borrowed' && isOverdue(l.dueDate);
                    const status = l.status === 'returned' ? 'Dikembalikan' : (overdue ? 'Terlambat' : 'Dipinjam');
                    return `<tr><td>${l.memberName}</td><td>${l.bookTitle}</td><td>${formatDate(l.loanDate)}</td><td>${formatDate(l.dueDate)}</td><td><span class="badge-cyber">${status}</span></td><td>${l.status === 'borrowed' ? `<button data-id="${l.id}" class="returnLoanBtn bg-green-600/50 hover:bg-green-600 px-3 py-1 rounded text-sm mr-1">Kembalikan</button><button data-id="${l.id}" class="deleteLoanBtn bg-red-600/50 hover:bg-red-600 px-3 py-1 rounded text-sm">Hapus</button>` : `<button data-id="${l.id}" class="deleteLoanBtn bg-red-600/50 hover:bg-red-600 px-3 py-1 rounded text-sm">Hapus</button>`}</td></tr>`;
                }).join('');
                document.querySelectorAll(".returnLoanBtn").forEach(btn => btn.onclick = () => processReturn(btn.dataset.id));
                document.querySelectorAll(".deleteLoanBtn").forEach(btn => btn.onclick = () => deleteLoan(btn.dataset.id));
            };
            render();
            
            document.getElementById("newLoanBtn").onclick = () => {
                openModal("Form Peminjaman", `
                    <select id="loanMember" class="input-cyber w-full p-2 rounded mb-3">${members.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}</select>
                    <select id="loanBook" class="input-cyber w-full p-2 rounded">${books.map(b => `<option value="${b.id}">${b.cover} ${b.title} (${b.availableStock})</option>`).join('')}</select>
                `, async () => {
                    const bookId = document.getElementById("loanBook").value;
                    const memberId = document.getElementById("loanMember").value;
                    const bookRef = doc(booksCol, bookId);
                    const book = await getDoc(bookRef);
                    if (book.data().availableStock <= 0) { showToast("Stok habis!", true); return; }
                    const loanDate = new Date().toISOString();
                    await addDoc(loansCol, { bookId, memberId, loanDate, dueDate: getDueDate(loanDate), status: "borrowed" });
                    await updateDoc(bookRef, { availableStock: book.data().availableStock - 1 });
                    loans = await loadLoans();
                    render();
                    showToast("Peminjaman sukses! 🚀");
                });
            };
            
            window.processReturn = async (loanId) => {
                const loanRef = doc(loansCol, loanId);
                const loan = await getDoc(loanRef);
                if (!loan.exists() || loan.data().status === 'returned') return;
                const data = loan.data();
                const returnDate = new Date().toISOString();
                const fee = calculateLateFee(data.dueDate, returnDate);
                await addDoc(returnsCol, { loanId, returnDate, lateFee: fee, finePaid: false });
                await updateDoc(loanRef, { status: "returned", returnDate });
                const bookRef = doc(booksCol, data.bookId);
                const book = await getDoc(bookRef);
                if (book.exists()) await updateDoc(bookRef, { availableStock: book.data().availableStock + 1 });
                showToast(fee ? `Denda Rp${fee.toLocaleString()}` : "Pengembalian sukses!");
                loans = await loadLoans();
                render();
            };
            
            window.deleteLoan = async (loanId) => {
                if (!confirm("Hapus peminjaman?")) return;
                const loanRef = doc(loansCol, loanId);
                const loan = await getDoc(loanRef);
                if (loan.exists() && loan.data().status === 'borrowed') {
                    const bookRef = doc(booksCol, loan.data().bookId);
                    const book = await getDoc(bookRef);
                    if (book.exists()) await updateDoc(bookRef, { availableStock: book.data().availableStock + 1 });
                }
                await deleteDoc(loanRef);
                loans = await loadLoans();
                render();
                showToast("Peminjaman dihapus");
            };
        }

            let myLoanIds = allLoans.filter(l => l.memberId === currentUser.memberId).map(l => l.id);
            let myFines = allReturns.filter(r => myLoanIds.includes(r.loanId) && r.lateFee > 0);
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4 text-cyan-400"><i class="fas fa-coins mr-2"></i>Denda Saya</h2><div class="overflow-x-auto"><table class="w-full table-cyber"><thead class="bg-gray-800/50"><tr><th>Buku</th><th>Denda</th><th>Status</th><th>Aksi</th></tr></thead><tbody>${myFines.map(f => `<tr><td>${f.bookTitle}</td><td class="text-pink-400">Rp${f.lateFee.toLocaleString()}</td><td>${f.finePaid ? '<span class="text-green-400">Lunas</span>' : '<span class="text-yellow-400">Belum Lunas</span>'}</td><td>${!f.finePaid ? `<button data-id="${f.id}" class="payFineBtnUser btn-cyber-secondary text-white px-3 py-1 rounded text-sm">Bayar</button>` : '-'}</td></tr>`).join('')}</tbody></table></div>`;
            document.querySelectorAll(".payFineBtnUser").forEach(btn => btn.onclick = () => showPaymentModal(btn.dataset.id));
        }
        
        function showPaymentModal(returnId) {
            const modal = document.getElementById("paymentModal");
            document.getElementById("paymentBody").innerHTML = `
                <p class="mb-3 text-cyan-300">Upload bukti pembayaran denda</p>
                <div class="bg-gray-800/50 p-3 rounded-lg mb-3">
                    <p class="text-sm"><i class="fas fa-university mr-2"></i>Bank BCA: 1234567890 a.n Perpus Digital</p>
                    <p class="text-sm mt-1"><i class="fas fa-qrcode mr-2"></i>QRIS: Scan kode berikut</p>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=LibFlowPayment" class="mx-auto mt-2">
                </div>
                <input type="file" id="proofImage" accept="image/*" class="input-cyber w-full p-2 rounded">
                <p class="text-xs text-gray-400 mt-2">Upload screenshot bukti transfer</p>
            `;
            modal.classList.remove("hidden");
            document.getElementById("confirmPaymentBtn").onclick = async () => {
                const fileInput = document.getElementById("proofImage");
                if (!fileInput.files.length) { showToast("Upload bukti dulu!", true); return; }
                const reader = new FileReader();
                reader.onload = async (e) => {
                    await updateDoc(doc(returnsCol, returnId), { paymentProof: e.target.result, finePaid: true });
                    showToast("Bukti terkirim! Admin akan konfirmasi.");
                    modal.classList.add("hidden");
                    renderUserFines(document.getElementById("contentPanel"));
                };
                reader.readAsDataURL(fileInput.files[0]);
            };
            document.getElementById("closePaymentBtn").onclick = () => modal.classList.add("hidden");
            document.getElementById("cancelPaymentBtn").onclick = () => modal.classList.add("hidden");
        }
        
        // Event Listeners
        setupPasswordToggle('toggleLoginPassword', 'loginPassword');
        setupPasswordToggle('toggleRegPassword', 'regPassword');
        document.getElementById("doLoginBtn").onclick = () => handleLogin(document.getElementById("loginUsername").value, document.getElementById("loginPassword").value);
        document.getElementById("doRegisterBtn").onclick = () => handleRegister(document.getElementById("regName").value, document.getElementById("regClass").value, document.getElementById("regPhone").value, document.getElementById("regUsername").value, document.getElementById("regPassword").value);
        document.getElementById("loginTabBtn").onclick = () => {
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("registerForm").classList.add("hidden");
            document.getElementById("loginTabBtn").className = "w-1/2 py-2.5 font-semibold rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white shadow-lg";
            document.getElementById("registerTabBtn").className = "w-1/2 py-2.5 font-semibold rounded-xl text-gray-300";
        };
        document.getElementById("registerTabBtn").onclick = () => {
            document.getElementById("registerForm").classList.remove("hidden");
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("registerTabBtn").className = "w-1/2 py-2.5 font-semibold rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white shadow-lg";
            document.getElementById("loginTabBtn").className = "w-1/2 py-2.5 font-semibold rounded-xl text-gray-300";
        };
        document.getElementById("logoutBtn").onclick = () => {
            localStorage.removeItem("libflow_user");
            currentUser = null;
            document.getElementById("dashboardSection").classList.add("hidden");
            document.getElementById("authSection").classList.remove("hidden");
            showToast("Logged out 👋");
        };
        
        const savedUser = localStorage.getItem("libflow_user");
        if (savedUser) {
            try { currentUser = JSON.parse(savedUser); renderDashboard(); }
            catch(e) { console.error(e); }
        } else {
            document.getElementById("authSection").classList.remove("hidden");
            document.getElementById("dashboardSection").classList.add("hidden");
        }
    </script>
</body>
</html>
