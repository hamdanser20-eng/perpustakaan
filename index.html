        .container {

            border-radius: 20px;

        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }

        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;

        async function loadBooksList() {
            const snapshot = await db.collection('books').get();
            if (snapshot.empty) {
                document.getElementById('bookList').innerHTML = '<p style="text-align:center; padding:20px;">📚 Belum ada data buku. Silakan tambah buku baru.</p>';
                return;
            }

            const activeLoans = await db.collection('transactions').where('status', '==', 'dipinjam').get();
            const borrowedCount = {};
            activeLoans.forEach(loan => {
                const bookId = loan.data().bookId;
                borrowedCount[bookId] = (borrowedCount[bookId] || 0) + 1;
            });
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Judul Buku</th>
                            <th>Penerbit</th>
                            <th>Stok Total</th>
                            <th>Stok Tersedia</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            for (const doc of snapshot.docs) {
                const data = doc.data();
                const stokTotal = data.stokTotal || 0;
                const dipinjam = borrowedCount[doc.id] || 0;
                const stokTersedia = stokTotal - dipinjam;
                const stokClass = stokTersedia <= 0 ? 'stok-habis' : 'stok-tersedia';
                
                html += `
                    <tr>
                        <td><strong>${escapeHtml(data.judul)}</strong></td>
                        <td>${escapeHtml(data.penerbit)}</td>
                        <td>${stokTotal}</td>
                        <td class="${stokClass}">${stokTersedia < 0 ? 0 : stokTersedia}</td>
                        <td>
                            <button class="btn-warning" onclick="editBook('${doc.id}')">✏️ Edit</button>
                            <button class="btn-danger" onclick="deleteBook('${doc.id}')">🗑️ Hapus</button>
                        </td>
                    </tr>
                `;
            }
            
            html += '</tbody></table>';
            document.getElementById('bookList').innerHTML = html;
        }

        async function loadReturnsData() {

            const snapshot = await db.collection('transactions').where('status', '==', 'dikembalikan').get();
            
            if (snapshot.empty) {
                document.getElementById('returnsTableContainer').innerHTML = '<p style="text-align:center; padding:20px;">📋 Belum ada data pengembalian buku.</p>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Peminjam</th>
                            <th>Buku</th>
                            <th>Tanggal Pinjam</th>
                            <th>Jatuh Tempo</th>
                            <th>Tanggal Kembali</th>
                            <th>Status</th>
                            <th>Denda</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            let totalDenda = 0;

            for (const doc of snapshot.docs) {
                const data = doc.data();
                const member = await db.collection('members').doc(data.memberId).get();
                const book = await db.collection('books').doc(data.bookId).get();
                
                const memberName = member.exists ? member.data().nama : '-';
                const memberKelas = member.exists ? member.data().kelas : '';
                const bookTitle = book.exists ? book.data().judul : '-';
                
                const tglPinjam = data.tanggalPinjam ? new Date(data.tanggalPinjam.toDate()) : null;
                const tglKembali = data.tanggalKembali ? new Date(data.tanggalKembali.toDate()) : null;
                
                let jatuhTempo = null;
                if (tglPinjam) {
                    jatuhTempo = new Date(tglPinjam);
                    jatuhTempo.setDate(jatuhTempo.getDate() + 7);
                }

                // Hitung denda (Rp 2000 per hari keterlambatan)
                let denda = 0;
                if (tglKembali && jatuhTempo) {
                    const tglKembaliDate = new Date(tglKembali);
                    tglKembaliDate.setHours(0, 0, 0, 0);
                    const jatuhTempoDate = new Date(jatuhTempo);
                    jatuhTempoDate.setHours(0, 0, 0, 0);
                    
                    if (tglKembaliDate > jatuhTempoDate) {
                        const diffTime = Math.abs(tglKembaliDate - jatuhTempoDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        denda = diffDays * 2000;
                        totalDenda += denda;
                    }
                }

                const tglPinjamStr = tglPinjam ? tglPinjam.toLocaleDateString('id-ID') : '-';
                const jatuhTempoStr = jatuhTempo ? jatuhTempo.toLocaleDateString('id-ID') : '-';
                const tglKembaliStr = tglKembali ? tglKembali.toLocaleDateString('id-ID') : '-';
                
                const dendaFormatted = denda > 0 ? `Rp ${denda.toLocaleString('id-ID')}` : 'Rp 0';
                const dendaClass = denda > 0 ? 'denda' : 'denda-zero';
                
                let statusText = 'Dikembalikan';
                let statusBadge = 'badge-dikembalikan';
                
                // Cek apakah telat
                if (denda > 0) {
                    statusText = 'Terlambat';
                    statusBadge = 'badge-terlambat';
                }

                html += `
                    <tr>
                        <td><strong>${escapeHtml(memberName)}</strong><br><small>${escapeHtml(memberKelas)}</small></td>
                        <td>${escapeHtml(bookTitle)}</td>
                        <td>${tglPinjamStr}</td>
                        <td>${jatuhTempoStr}</td>
                        <td>${tglKembaliStr}</td>
                        <td><span class="badge ${statusBadge}">${statusText}</span></td>
                        <td class="${dendaClass}">${dendaFormatted}</td>
                    </tr>
                `;
            }

            html += `
                    </tbody>
                    <tfoot>
                        <tr style="background: #f0f0f0; font-weight: bold;">
                            <td colspan="6" style="text-align: right;">Total Denda Keseluruhan:</td>
                            <td class="denda">Rp ${totalDenda.toLocaleString('id-ID')}</td>
                        </tr>
                    </tfoot>
                </table>
            `;
            
            document.getElementById('returnsTableContainer').innerHTML = html;
        }

        async function loadTransactionsTable() {
            const snapshot = await db.collection('transactions').get();

                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Peminjam</th>
                            <th>Buku</th>
                            <th>Status</th>
                            <th>Tanggal Peminjaman</th>
                            <th>Jatuh Tempo</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            for (const doc of snapshot.docs) {
                const data = doc.data();
                const member = await db.collection('members').doc(data.memberId).get();
                const book = await db.collection('books').doc(data.bookId).get();
                
                const tglPinjam = data.tanggalPinjam ? new Date(data.tanggalPinjam.toDate()) : null;
                
                let jatuhTempo = null;
                if (tglPinjam) {
                    jatuhTempo = new Date(tglPinjam);
                    jatuhTempo.setDate(jatuhTempo.getDate() + 7);
                }

                let statusText = '';
                let statusBadge = '';
                let isOverdue = false;

                if (data.status === 'dipinjam') {
                    if (jatuhTempo && jatuhTempo < today) {
                        statusText = 'Terlambat';
                        statusBadge = 'badge-terlambat';
                        isOverdue = true;
                    } else {
                        statusText = 'Dipinjam';
                        statusBadge = 'badge-dipinjam';
                    }
                } else {
                    statusText = 'Dikembalikan';
                    statusBadge = 'badge-dikembalikan';
                }

                const tglPinjamStr = tglPinjam ? tglPinjam.toLocaleDateString('id-ID') : '-';
                const jatuhTempoStr = jatuhTempo ? jatuhTempo.toLocaleDateString('id-ID') : '-';

                html += `
                    <tr>
                        <td><strong>${member.exists ? member.data().nama : '-'}</strong><br><small>${member.exists ? member.data().kelas : ''}</small></td>
                        <td>${book.exists ? book.data().judul : '-'}<br><small>${book.exists ? book.data().penerbit : ''}</small></td>
                        <td><span class="badge ${statusBadge}">${statusText}</span></td>
                        <td>${tglPinjamStr}</td>
                        <td style="${isOverdue ? 'color:red; font-weight:bold;' : ''}">${jatuhTempoStr} ${isOverdue ? '⚠️' : ''}</td>
                        <td>
                            ${data.status === 'dipinjam' ? `<button class="btn-warning" onclick="returnBookFromAdmin('${doc.id}', '${data.bookId}')">📤 Kembalikan</button>` : '<span style="color:green;">✓ Selesai</span>'}
                        </td>
                    </tr>
                `;
            }

            html += '</tbody></table>';
            document.getElementById('transactionTableContainer').innerHTML = html;
        }

        window.saveNewLoan = async () => {
            const memberId = document.getElementById('modalMemberSelect').value;
            const bookId = document.getElementById('modalBookSelect').value;
            const tanggalPinjamStr = document.getElementById('modalTanggalPinjam').value;

            if (!memberId || !bookId) {
                showMessage('⚠️ Pilih anggota dan buku terlebih dahulu!');
                return;
            }

            const bookDoc = await db.collection('books').doc(bookId).get();
            const stokTotal = bookDoc.data().stokTotal || 0;
            
            const activeLoans = await db.collection('transactions')
                .where('bookId', '==', bookId)
                .where('status', '==', 'dipinjam')
                .get();
            const stokTersedia = stokTotal - activeLoans.size;
            
            if (stokTersedia <= 0) {
                showMessage('⚠️ Stok buku habis! Tidak dapat meminjam.');
                return;
            }

            const tanggalPinjam = new Date(tanggalPinjamStr);
            tanggalPinjam.setHours(7, 0, 0, 0);

            await db.collection('transactions').add({
                memberId,
                bookId,
                tanggalPinjam: tanggalPinjam,
                status: 'dipinjam'
            });

            showMessage('✅ Peminjaman baru berhasil ditambahkan!', 'success');
            closeLoanModal();
            await loadTransactionsTable();
            await loadReturnsData();
            await loadBooksList();
            await populateModalSelects();
        };

        async function populateModalSelects() {
            const members = await db.collection('members').get();
            const books = await db.collection('books').get();
            
            const activeLoans = await db.collection('transactions').where('status', '==', 'dipinjam').get();
            const borrowedCount = {};
            activeLoans.forEach(loan => {
                const bookId = loan.data().bookId;
                borrowedCount[bookId] = (borrowedCount[bookId] || 0) + 1;
            });
            
            let memberHtml = '<option value="">-- Pilih Anggota --</option>';
            members.forEach(doc => memberHtml += `<option value="${doc.id}">${escapeHtml(doc.data().nama)} (${escapeHtml(doc.data().kelas)})</option>`);
            
            let bookHtml = '<option value="">-- Pilih Buku --</option>';
            for (const doc of books.docs) {
                const data = doc.data();
                const stokTotal = data.stokTotal || 0;
                const dipinjam = borrowedCount[doc.id] || 0;
                const stokTersedia = stokTotal - dipinjam;
                bookHtml += `<option value="${doc.id}" ${stokTersedia <= 0 ? 'disabled' : ''}>${escapeHtml(data.judul)} - Stok Tersedia: ${stokTersedia < 0 ? 0 : stokTersedia}</option>`;
            }
            
            const memberSelect = document.getElementById('modalMemberSelect');
            const bookSelect = document.getElementById('modalBookSelect');
            if (memberSelect) memberSelect.innerHTML = memberHtml;
            if (bookSelect) bookSelect.innerHTML = bookHtml;
        }

            const isConnected = await initializeDatabase();
            if (isConnected) renderLogin();
            else document.getElementById('app').innerHTML = '<div class="container"><div class="card"><h3>Koneksi Gagal</h3><button onclick="location.reload()">Refresh</button></div></div>';
        }

        startApp();
